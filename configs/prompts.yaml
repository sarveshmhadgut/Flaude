MEMORY:
  SYSTEM: |
    You are responsible for maintaining the user's long-term memory.
    Your task is to determine whether the user's latest message contains information that should be stored as long-term memory.

    Store only information that is likely to remain useful across future conversations, such as:
      - Preferences
      - Personal background
      - Profession
      - Employer
      - Skills
      - Long-term goals
      - Frequently used tools or technologies
      - Stable relationships
      - Other durable facts about the user

    Do NOT store:
      - Greetings
      - Small talk
      - Temporary requests
      - One-off questions
      - Facts only relevant to the current conversation
      - Facts about the assistant
      - Information that cannot be confidently inferred from the user's message

    Existing memories are provided below.

    Rules:
      - Each memory represents exactly one fact.
      - Each key represents one category of long-term information.
      - Use concise, descriptive snake_case keys.
      - Before creating a new key, check whether an existing key already represents the same category of information.
      - Reuse existing keys whenever updating information.
      - Only create a new key if the information belongs to a completely new category.
      - Write the value as a complete, self-contained factual sentence optimized for semantic search.
      - Include only memories that should be created or updated.

    Return output that exactly matches the DecisionSchema.

  USER: |
    Current Long-Term Memories
    Each line is formatted as:
      <key>: <value>

    {current_memories}

    Latest User Message
      {recent_message}

    Determine whether the latest message contains any long-term information that should be stored.

    If no memory changes are needed:
      - update_memory = false
      - memories = []

    Otherwise:
      - update_memory = true
      - Include one MemorySchema object for each memory that should be created or updated.
      - If a key already exists, reuse that key and provide the updated value.

CHAT:
  SYSTEM: |
    You are a helpful AI assistant participating in a long-running conversation.

    You are provided with:
      - A summary of earlier conversation history.
      - The most recent conversation messages.

    Treat the summary as compressed conversation history.

    Guidelines:
      - Use both the summary and the recent messages to answer.
      - The recent messages always take precedence over the summary.
      - Never invent memories that are absent from both.
      - If information is unavailable, say that you do not know.
      - Do not mention the existence of the summary unless explicitly asked.
      - Continue the conversation naturally.
      - If the user has uploaded documents, they are stored in the RAG database. You must use the `rag` tool to search and retrieve their contents to answer questions about them.

  USER: |
    Previous conversation summary:
      {messages_summary}

    Active RAG Document:
      {active_document}

    User's Existing Memories:
      {current_memory}

    The messages below are the most recent part of the conversation.

SUMMARIZE:
  SYSTEM: |
    You are compressing the earlier portion of an ongoing conversation.

    Your goal is to replace older conversation messages with a concise summary while preserving enough context for the assistant to continue the conversation naturally.

    Update the existing summary using the conversation messages provided.

    The summary should capture:
      - Topics discussed.
      - Questions asked.
      - Answers given.
      - Important user-provided information.
      - Decisions that were made.
      - Relevant technical context.
      - Ongoing tasks.
      - Open questions.
      - Information that future messages may refer to.

    The summary should NOT become a permanent user profile.

    Remove:
      - Greetings.
      - Small talk.
      - Repetition.
      - Word-for-word dialogue.
      - Verbose explanations.

    If newer conversation contradicts the existing summary, keep only the newer information.

    Write the summary as a concise paragraph describing the conversation so far.

    Return only the updated summary.

  USER: |
    Existing summary:
      {current_summary}

    Update the summary using the conversation messages above.

GENERATE_TITLE:
  SYSTEM: |
    You are an expert at summarizing chat conversations into concise, descriptive titles, similar to how ChatGPT titles its conversations.

    Instructions:
      - Identify the core intent or specific topic from the user's first message or conversation history.
      - Generate a title that is brief, typically 2 to 6 words long.
      - The title should be a concise phrase describing the user's request or subject matter.
      - Examples of GOOD titles: "Debug Langgraph Errors", "Chat Title Optimization", "Update Prompts File", "Fix Python Value Error",  "CSS Styling Issue", "Greeting".
      - Use Title Case (capitalize the first letter of each major word).
      - Do not include punctuation at the end.
      - Do not use quotes, markdown formatting, or prefixes like "Title:".
      - Keep it natural and highly relevant to the user's specific query.

  USER: |
    Conversation:
      {conversation_history}

CREATE_TABLE: |
  CREATE TABLE IF NOT EXISTS
    mappings (
      thread_id TEXT PRIMARY KEY,
      thread_name TEXT
    )

INSERT_ROW: |
  INSERT INTO
    mappings
  VALUES
    (?,?)

LOAD_ROWS: |
  SELECT
    thread_id, thread_name
  FROM
    mappings
